[package]
name = "match"
version = "0.1.0"
type = "bin"
authors = ["Lumen Dark Pool <https://github.com/Jay0xx/lumen-dark-pool>"]
description = "ZK matching circuit for the Lumen Dark Pool (1 BUY <-> 1 SELL)"
license = "MIT"
# Noir 1.0.0-beta.22 — pinned to match the toolchain the rest of the repo uses.

[dependencies]
# External Poseidon crate. SAME dep + SAME tag as the Day-1 hello circuit
# (circuits/hello/Nargo.toml) and the Day-2 off-chain helper
# (prover/compute-hash/Nargo.toml). Using the external crate (not stdlib)
# is what keeps us on the Filecoin-style parameter set; switching to the
# stdlib `std::hash::poseidon::poseidon_hash` would silently change the
# hash values and break Day-2 parity.
poseidon = { tag = "v0.2.0", git = "https://github.com/noir-lang/poseidon" }

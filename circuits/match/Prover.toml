# Prover.toml - T1 happy-path inputs (see /circuits/SPEC.md section 6)
#
# buy:  side=0 pair=42 amount=100 limit=105 owner=12345 nonce=111
# sell: side=1 pair=42 amount=80  limit=100 owner=67890 nonce=222
#
# Expected:
#   fill_amount    = min(100, 80)            = 80
#   clearing_price = floor((105 + 100) / 2)  = 102
#   commit_buy     = Poseidon(0, 42, 100, 105, 12345, 111)
#   commit_sell    = Poseidon(1, 42, 80,  100, 67890, 222)
#   nullifier_buy  = Poseidon(commit_buy,  NULLIFIER_DOMAIN)
#   nullifier_sell = Poseidon(commit_sell, NULLIFIER_DOMAIN)
#
# Day-4 additions: owner_buy + owner_sell are the trader's Field IDs (already
# cryptographically bound by C1's commitment opening). The settlement contract
# looks them up against register_owner() to find the real Stellar addresses.
#
# The four hash fields below are no longer placeholders - they are real
# commitments + nullifiers computed by /prover/compute-hash (Filecoin-style
# Poseidon, BN254 Fr, alpha=5). Regenerate with `nargo execute` if you
# change any of the buy/sell order fields above.

# public
